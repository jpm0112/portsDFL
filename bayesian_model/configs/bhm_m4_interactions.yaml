# M4: M0 + selective vessel * berth interactions for cells with n >= 30.
model_key: m4_interactions

data:
  path: training_dataset_bhm.csv
  target: service_time_hours
  vessel_col: "Tipo nave (agrupado)"
  berth_col: "Sitio"
  service_col: "Servicio"
  train_year_max: 2024

priors:
  alpha0_mean: 3.47
  alpha0_sd: 1.0
  tau_halfnormal_sd: 0.5
  sigma_halfnormal_sd: 0.7
  min_interaction_n: 30

sampler:
  backend: pymc
  chains: 4
  tune: 1000
  draws: 1000
  target_accept: 0.95
  random_seed: 42

output:
  trace: outputs/traces/m4_interactions.nc
  posterior_samples: outputs/posterior_samples/m4_interactions_cells.parquet
  n_predictive_draws: 4000
  predict_unobserved_cells: true
